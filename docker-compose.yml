version: '3.9'

services:

  app:
    build: .
    container_name: telecomm_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=5000
    volumes:
      - app_data:/app/backend/instance
    networks:
      - telecomm_net

  nginx:
    image: nginx:alpine
    container_name: telecomm_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - telecomm_net

volumes:
  app_data:

networks:
  telecomm_net:
    driver: bridge